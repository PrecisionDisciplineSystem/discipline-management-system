<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Precision Discipline System</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

    <aside class="sidebar">

        <h2>Precision Discipline System</h2>

        <p id="welcomeUser"></p>

        <hr>

        <button>Dashboard</button>
        <button>Generate Discipline</button>
        <button>Employee History</button>
        <button>Upload Signed Documents</button>
        <button>Search Documents</button>

        <hr>

        <button onclick="signOut()">Sign Out</button>

    </aside>


    <main class="content">

        <h1>Welcome!</h1>

        <p>
            Select an option from the menu to get started.
        </p>

        <br>

        <h3>Future Features</h3>

        <ul>
            <li>Automatic progression recommendations</li>
            <li>Employee discipline history</li>
            <li>Signed document storage</li>
            <li>Reporting dashboard</li>
            <li>Location filtering</li>
        </ul>

    </main>

</div>


<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script src="script.js"></script>

<script>

const account = msalInstance.getAllAccounts()[0];

if(account){

    document.getElementById("welcomeUser").innerText =
    "Welcome,\n" + account.name;

}
else{

    window.location.href = "login.html";

}

</script>

</body>
</html>
