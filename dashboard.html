<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Precision Discipline System
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app-container">


    <!-- SIDEBAR -->

    <aside class="sidebar">


        <h2>
        Precision Discipline System
        </h2>


        <p id="welcomeUser"></p>


        <hr>


        <button onclick="loadContent('dashboard')">
            Dashboard
        </button>


        <button onclick="loadContent('generate')">
            Generate Discipline
        </button>


        <button onclick="loadContent('history')">
            Employee History
        </button>


        <button onclick="loadContent('upload')">
            Upload Signed Documents
        </button>


        <button onclick="loadContent('search')">
            Search Cases
        </button>


        <hr>


        <h4>
        TOOLS
        </h4>


        <button onclick="loadContent('calculator')">
            Progression Calculator
        </button>



        <hr>


        <h4>
        ADMIN
        </h4>


        <button onclick="loadContent('settings')">
            Settings
        </button>



        <hr>


        <button onclick="signOut()">
            Sign Out
        </button>


    </aside>





    <!-- MAIN CONTENT -->

    <main class="content" id="mainContent">


    </main>



</div>





<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

<script src="script.js"></script>



<script>


const account =
checkLogin();



if(account){


document.getElementById("welcomeUser")
.innerText =
"Welcome, " + account.name;



loadContent("dashboard");



}

else{


window.location.href =
"login.html";


}




</script>


</body>

</html>
